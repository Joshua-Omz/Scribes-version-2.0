<style>
        body {
            background-color: #F5F0E8;
            color: #1A1612;
            font-family: 'Inter', sans-serif;
        }
        
        .tab-btn {
            font-family: 'EB Garamond', serif;
            font-size: 24px;
            color: #78776f;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s ease;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        
        .tab-btn.active {
            color: #1A1612;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #1A1612;
        }
        
        .input-field {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid rgba(26, 22, 18, 0.15);
            padding: 12px 0;
            font-size: 16px;
            color: #1A1612;
            transition: border-color 0.3s ease;
            border-radius: 0;
        }
        
        .input-field:focus {
            outline: none;
            border-bottom-color: #9A7020;
            box-shadow: 0 1px 0 0 #9A7020;
        }
        
        .input-field::placeholder {
            color: #78776f;
            font-size: 15px;
            font-weight: 400;
        }
        
        .form-section {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        
        .form-section.active {
            display: block;
            opacity: 1;
        }

        .cta-button {
            background-color: #1c1b1b;
            color: #F5F0E8;
            border: 1px solid #1c1b1b;
            transition: all 0.3s ease;
        }
        
        .cta-button:active {
            transform: scale(0.98);
        }
        
        .cta-button-gold {
            background-color: #9A7020;
            color: #FDFAF4;
            border: none;
            border-radius: 6px;
            padding: 16px 24px;
            font-weight: 500;
            font-size: 16px;
            width: 100%;
            transition: opacity 0.2s ease;
        }
        
        .cta-button-gold:active {
            opacity: 0.9;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-[#F5F0E8] antialiased">
<!-- TopAppBar -->
<header class="w-full top-0 sticky border-b border-outline-variant bg-[#F5F0E8] z-50">
<div class="flex justify-between items-center px-margin-mobile py-unit max-w-container-max mx-auto">
<button aria-label="Menu" class="text-on-surface-variant hover:text-tertiary transition-colors duration-300 scale-95 duration-150 p-2 -ml-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile tracking-widest text-[#1A1612]">SCRIBES</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-grow w-full max-w-md mx-auto flex flex-col justify-center py-12 px-2">
<!-- Tab Switcher -->
<div class="flex space-x-8 mb-12 border-b border-outline-variant/30 pb-4">
<button class="tab-btn active" id="tab-register" onclick="switchTab('register')">Register</button>
<button class="tab-btn" id="tab-login" onclick="switchTab('login')">Login</button>
</div>
<!-- Register State -->
<div class="form-section active space-y-8" id="form-register">
<div class="space-y-6">
<div>
<input autocomplete="name" class="input-field" id="reg-name" placeholder="Display name" type="text"/>
</div>
<div>
<input autocomplete="username" class="input-field" id="reg-handle" placeholder="@handle" type="text"/>
</div>
<div>
<input autocomplete="email" class="input-field" id="reg-email" placeholder="Email address" type="email"/>
</div>
<div>
<input autocomplete="new-password" class="input-field" id="reg-password" placeholder="Password" type="password"/>
</div>
</div>
<div class="pt-8">
<button class="cta-button-gold mb-4" type="button">Create Account</button>
<p class="text-center font-body-md text-[13px] text-on-surface-variant leading-relaxed">
                    Your identity on Scribes is permanent.<br/>Choose your handle carefully.
                </p>
</div>
</div>
<!-- Login State -->
<div class="form-section space-y-8" id="form-login">
<div class="space-y-6">
<div>
<input autocomplete="email" class="input-field" id="login-email" placeholder="Email address" type="email"/>
</div>
<div>
<input autocomplete="current-password" class="input-field" id="login-password" placeholder="Password" type="password"/>
</div>
</div>
<div class="pt-8 flex flex-col items-center">
<button class="cta-button-gold mb-6" type="button">Enter</button>
<button class="text-on-surface-variant hover:text-[#1A1612] text-sm transition-colors border-b border-transparent hover:border-[#1A1612]" type="button">
                    Forgot password?
                </button>
</div>
</div>
</main>
<script>
        function switchTab(tabId) {
            // Update Tab Buttons
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');

            // Hide all forms, show selected
            const forms = document.querySelectorAll('.form-section');
            forms.forEach(form => {
                form.classList.remove('active');
                setTimeout(() => {
                    if(!form.classList.contains('active')) {
                        form.style.display = 'none';
                    }
                }, 300); // Wait for fade out
            });

            const targetForm = document.getElementById(`form-${tabId}`);
            targetForm.style.display = 'block';
            // slight delay to allow display:block to apply before changing opacity
            setTimeout(() => {
                targetForm.classList.add('active');
            }, 10);
        }
    </script>
</body></html>
