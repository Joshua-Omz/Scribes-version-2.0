The effort is not to earn salvation, but to steward the grace we've been freely given.

Key points to remember:
- Effort is not opposed to grace; earning is opposed to grace.
- The same grace that saves us also trains us (Titus 2:11-12).
- Spiritual disciplines are not works of merit, but postures to receive more grace.</textarea>

<script>
        // Simple auto-resize for textarea to feel endless
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
        
        // Initial resize
        textarea.style.height = (textarea.scrollHeight) + 'px';

        // Fake auto-save indicator logic
        const inputs = document.querySelectorAll('input, textarea');
        const saveDot = document.querySelector('.bg-tertiary.rounded-full');
        let saveTimeout;

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                saveDot.classList.remove('bg-tertiary');
                saveDot.classList.add('bg-outline-variant');
                saveDot.title = "Saving...";
                
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    saveDot.classList.remove('bg-outline-variant');
                    saveDot.classList.add('bg-tertiary');
                    saveDot.title = "Saved";
                }, 1000);
            });
        });
    </script>
