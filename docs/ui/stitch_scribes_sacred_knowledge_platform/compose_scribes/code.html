<p class="text-[15px] text-[#1A1612]/70 text-center mb-8 leading-relaxed px-4">

            </p>
<div class="space-y-3">

                    Commit to Archives
                </button>
<button class="w-full bg-transparent text-[#1A1612] py-3.5 rounded-[6px] font-medium text-[16px] tracking-wide border border-[#DDD5C0] hover:bg-[#F5F0E8] transition-colors" id="cancel-publish">
                    Continue Drafting
                </button>
</div>
</div>
</div>
<script>
        // Simple logic to simulate validation
        const titleInput = document.getElementById('title-input');
        const bodyEditor = document.getElementById('body-editor');
        const publishBtn = document.getElementById('publish-btn');
        const overlay = document.getElementById('publish-overlay');
        const cancelPublish = document.getElementById('cancel-publish');

        function checkValidation() {
            // In a real app, we'd also check category presence
            if (titleInput.value.trim().length > 0 && bodyEditor.textContent.trim().length > 0) {
                publishBtn.disabled = false;
                publishBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                publishBtn.classList.add('hover:text-[#805C1A]');
            } else {
                publishBtn.disabled = true;
                publishBtn.classList.add('opacity-50', 'cursor-not-allowed');
                publishBtn.classList.remove('hover:text-[#805C1A]');
            }
        }

        titleInput.addEventListener('input', checkValidation);
        bodyEditor.addEventListener('input', checkValidation);

        publishBtn.addEventListener('click', () => {
            if(!publishBtn.disabled) {
                overlay.classList.remove('hidden');
            }
        });

        cancelPublish.addEventListener('click', () => {
            overlay.classList.add('hidden');
        });
        
        // Hide overlay when clicking outside the bottom sheet
        overlay.addEventListener('click', (e) => {
            if(e.target === overlay) {
                overlay.classList.add('hidden');
            }
        });
    </script>
