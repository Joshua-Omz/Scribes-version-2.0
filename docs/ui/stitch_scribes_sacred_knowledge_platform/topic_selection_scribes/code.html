<body class="bg-background text-on-background min-h-screen font-body-md antialiased flex flex-col items-center justify-center">
<!-- Mobile Container (Max width constraint to simulate mobile on desktop, centered) -->
<div class="w-full max-w-md bg-surface min-h-screen flex flex-col relative mx-auto shadow-sm border-x border-outline-variant">
<!-- Header Section -->
<header class="pt-16 pb-8 px-margin-mobile flex flex-col items-center text-center">

<p class="font-body-md text-body-md text-secondary max-w-[280px]">
                Select the topics that shape your faith. Your feed begins here.
            </p>
</header>
<!-- Main Content: Topic Chips Grid -->
<main class="flex-1 px-margin-mobile pb-24 overflow-y-auto">
<div class="flex flex-wrap gap-3 justify-center">
<!-- Selected Chip: Theology -->
<button class="flex items-center gap-2 px-4 py-2 rounded border-gold-thick bg-gold-faint text-gold font-body-md text-sm transition-transform active:scale-95">
<svg fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="14">
<path d="M12 2v20M2 12h20M12 7a5 5 0 0 0-5 5M12 17a5 5 0 0 0 5-5"></path>
</svg>
                    Theology
                </button>
<!-- Unselected Chip -->
<button class="flex items-center gap-2 px-4 py-2 rounded border-gold-muted-half text-secondary font-body-md text-sm hover:border-gold-thick hover:text-on-surface transition-colors">

<!-- Selected Chip: Church History -->
<button class="flex items-center gap-2 px-4 py-2 rounded border-gold-thick bg-gold-faint text-gold font-body-md text-sm transition-transform active:scale-95">
<svg fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="14">
<path d="M12 2v20M2 12h20M12 7a5 5 0 0 0-5 5M12 17a5 5 0 0 0 5-5"></path>
</svg>

                </button>
<!-- Selected Chip: Prayer -->
<button class="flex items-center gap-2 px-4 py-2 rounded border-gold-thick bg-gold-faint text-gold font-body-md text-sm transition-transform active:scale-95">

<path d="M12 2v20M2 12h20M12 7a5 5 0 0 0-5 5M12 17a5 5 0 0 0 5-5"></path>
</svg>

                </button>

<button class="flex items-center gap-2 px-4 py-2 rounded border-gold-muted-half text-secondary font-body-md text-sm hover:border-gold-thick hover:text-on-surface transition-colors">Apologetics</button>
