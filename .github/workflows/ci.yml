name: Scribes CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # BACKEND: GO & POSTGRESQL
  # ==========================================
  backend-checks:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    # Only run if files in the backend folder change
    # Official GitHub Actions monorepo best practice
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Standard community action for Go
      - name: Setup Go 1.22+
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: go mod download

      # golangci-lint is the undisputed community standard for Go linting
      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: backend
          version: latest

      - name: Run Go Unit & Integration Tests
        # -race flag catches concurrency bugs (crucial for Goroutines)
        run: go test -v -race ./...

  # ==========================================
  # CLIENT: FLUTTER (iOS/Android/Web)
  # ==========================================
  client-checks:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # subosito/flutter-action is the official standard for Flutter CI
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # Fails the build if there are syntax or formatting errors
      - name: Analyze Code
        run: flutter analyze

      - name: Run Flutter Tests
        run: flutter test
