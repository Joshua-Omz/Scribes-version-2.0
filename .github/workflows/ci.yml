name: Scribes CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # BACKEND: GO & POSTGRESQL
  # ==========================================
  backend-checks:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    # Only run if files in the backend folder change
    # Official GitHub Actions monorepo best practice
    defaults:
      run:
        working-directory: ./backend

    # Spin up a real PostgreSQL instance so integration tests can run against it
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scribes_test
          POSTGRES_USER: scribes_test
          POSTGRES_PASSWORD: scribes_test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U scribes_test -d scribes_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Standard community action for Go
      - name: Setup Go 1.22+
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install Dependencies
        run: go mod download

      # golangci-lint is the undisputed community standard for Go linting
      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: backend
          version: latest

      - name: Run Go Unit Tests
        # -race flag catches concurrency bugs (crucial for Goroutines)
        run: go test -v -race ./...

      - name: Run Integration Tests
        # Integration tests use a real PostgreSQL database.
        # The -tags integration flag activates the //go:build integration files.
        env:
          TEST_DATABASE_URL: postgres://scribes_test:scribes_test_secret@localhost:5432/scribes_test?sslmode=disable
        run: go test -v -race -tags integration ./...

  # ==========================================
  # CLIENT: FLUTTER (iOS/Android/Web)
  # ==========================================
  client-checks:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # subosito/flutter-action is the official standard for Flutter CI
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any' 
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # Fails the build if there are syntax or formatting errors
      - name: Analyze Code
        run: flutter analyze

      - name: Run Flutter Tests
        run: flutter test
